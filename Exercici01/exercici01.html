<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taula de multiplicar</title>
    <script>
        function validarFormulari() {
            let numero = document.getElementById("numero").value.trim();
            let missatge_error = document.getElementById("error");

            if (numero === "" || isNaN(numero) || numero < 1 || numero > 10 || !Number.isInteger(Number(numero))) {
                missatge_error.textContent = "Si us plau, introdueix un número enter entre 1 i 10.";
                return false;
            }
            missatge_error.textContent = "";
            return true;
        }
    </script>
</head>
<body>
    <h1>Taula de multiplicar</h1>
    <form action="exercici01.php" method="GET" onsubmit="return validarFormulari();">
        <label for="numero">Introdueix un número enter (1-10):</label><br>
        <input type="text" id="numero" name="numero"><br><br>

        <p id="error" style="color: red;"></p>

        <input type="submit" value="Mostrar taula">
    </form>
</body>
</html>
